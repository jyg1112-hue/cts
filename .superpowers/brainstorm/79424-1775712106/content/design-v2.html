<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>날씨 위젯 v2</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #e8eaed;
    font-family: "Malgun Gothic", -apple-system, sans-serif;
    padding: 24px;
    color: #1f2937;
  }
  .page-label {
    font-size: 11px;
    color: #6b7280;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .dash-header {
    background: #1a3a5c;
    border-radius: 10px 10px 0 0;
    padding: 10px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .dash-header-title { font-size: 15px; font-weight: 700; color: #fff; }
  .dash-body {
    background: #f0f2f5;
    border-radius: 0 0 10px 10px;
    padding: 14px;
  }
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 12px;
  }
  .kpi-card {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 14px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.07);
  }
  .kpi-label { font-size: 11px; color: #6b7280; margin-bottom: 6px; }
  .kpi-value { font-size: 24px; font-weight: 800; color: #111827; }
  .kpi-sub { font-size: 11px; color: #9ca3af; margin-top: 4px; }
  .main-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
  }
  .panel {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
  }
  .chart-panel {
    padding: 16px;
    min-height: 300px;
    display: flex;
    flex-direction: column;
  }
  .panel-title {
    font-size: 13px;
    font-weight: 700;
    color: #374151;
    margin-bottom: 12px;
  }
  .chart-placeholder {
    flex: 1;
    background: #f8fafc;
    border-radius: 6px;
    border: 1px dashed #e5e7eb;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #d1d5db;
    font-size: 12px;
  }

  /* ===== WEATHER PANEL ===== */
  .weather-panel {
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 10px;
    box-shadow: 0 1px 6px rgba(0,0,0,0.08);
    overflow: visible;
    position: relative;
    min-height: 300px;
    display: flex;
    flex-direction: column;
  }
  .weather-header {
    padding: 12px 14px 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid #f3f4f6;
  }
  .weather-title {
    font-size: 13px;
    font-weight: 700;
    color: #374151;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 10px;
    color: #10b981;
    background: #ecfdf5;
    border: 1px solid #a7f3d0;
    border-radius: 20px;
    padding: 2px 8px;
    font-weight: 600;
  }
  .live-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: #10b981;
  }
  .map-area {
    flex: 1;
    position: relative;
    padding: 10px 12px 6px;
  }

  /* Tooltip */
  .mine-tooltip {
    position: absolute;
    top: 14px;
    left: 55%;
    background: #fff;
    border: 1px solid #e5e7eb;
    border-radius: 8px;
    padding: 8px 10px;
    width: 130px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    pointer-events: none;
    z-index: 10;
  }
  .tooltip-mine-name {
    font-size: 10px;
    font-weight: 700;
    color: #1a3a5c;
    margin-bottom: 6px;
    padding-bottom: 5px;
    border-bottom: 1px solid #f3f4f6;
  }
  .tooltip-row {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 2.5px 0;
  }
  .tooltip-day { font-size: 10px; color: #9ca3af; width: 26px; }
  .tooltip-icon { font-size: 11px; }
  .tooltip-temp { font-size: 11px; font-weight: 700; color: #1f2937; margin-left: auto; }
  .tooltip-condition { font-size: 9px; color: #9ca3af; }
  .connector-line {
    position: absolute;
    top: 74px;
    left: calc(55% - 1px);
    width: 1px;
    height: 24px;
    background: linear-gradient(to bottom, #93c5fd, transparent);
    z-index: 5;
  }

  .weather-footer {
    padding: 7px 14px;
    border-top: 1px solid #f3f4f6;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .footer-text { font-size: 10px; color: #9ca3af; }
</style>
</head>
<body>

<div class="page-label">디자인 목업 v2 — 대시보드 색상 통일</div>

<div>
  <div class="dash-header">
    <span class="dash-header-title">⚓ 하역 데이터 대시보드</span>
    <span style="font-size:11px;color:rgba(255,255,255,0.5);">2026-04-08</span>
  </div>
  <div class="dash-body">

    <div class="kpi-row">
      <div class="kpi-card">
        <div class="kpi-label">총 하역량</div>
        <div class="kpi-value">14,280<span style="font-size:13px;font-weight:400;color:#9ca3af;">t</span></div>
        <div class="kpi-sub">↑ 전월 대비 +3.2%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">가동 선석</div>
        <div class="kpi-value">5<span style="font-size:13px;font-weight:400;color:#9ca3af;">/7</span></div>
        <div class="kpi-sub">2선석 유지보수</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">평균 하역속도</div>
        <div class="kpi-value">840<span style="font-size:13px;font-weight:400;color:#9ca3af;">t/h</span></div>
        <div class="kpi-sub">목표 대비 97%</div>
      </div>
      <div class="kpi-card">
        <div class="kpi-label">대기 선박</div>
        <div class="kpi-value">2</div>
        <div class="kpi-sub">입항 예정 3척</div>
      </div>
    </div>

    <div class="main-grid">
      <div class="panel chart-panel">
        <div class="panel-title">월별 하역량 추이</div>
        <div class="chart-placeholder">차트 영역</div>
      </div>
      <div class="panel chart-panel">
        <div class="panel-title">화물 타입별 비중</div>
        <div class="chart-placeholder">차트 영역</div>
      </div>

      <!-- Weather Panel -->
      <div class="weather-panel">
        <div class="weather-header">
          <span class="weather-title">뉴칼레도니아 날씨 현황</span>
          <span class="live-badge"><span class="live-dot"></span>실시간</span>
        </div>

        <div class="map-area">
          <!-- Hover tooltip (Koniambo) -->
          <div class="mine-tooltip">
            <div class="tooltip-mine-name">⛏ Koniambo</div>
            <div class="tooltip-row">
              <span class="tooltip-day">오늘</span>
              <span class="tooltip-icon">☀️</span>
              <span class="tooltip-condition">맑음</span>
              <span class="tooltip-temp">27°</span>
            </div>
            <div class="tooltip-row">
              <span class="tooltip-day">내일</span>
              <span class="tooltip-icon">⛅</span>
              <span class="tooltip-condition">구름</span>
              <span class="tooltip-temp">25°</span>
            </div>
            <div class="tooltip-row">
              <span class="tooltip-day">모레</span>
              <span class="tooltip-icon">🌧️</span>
              <span class="tooltip-condition">비</span>
              <span class="tooltip-temp">22°</span>
            </div>
          </div>
          <div class="connector-line"></div>

          <svg viewBox="0 0 300 200" style="width:100%;height:100%;min-height:210px;">
            <defs>
              <!-- Light ocean gradient matching dashboard bg -->
              <linearGradient id="oceanGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#dbeafe"/>
                <stop offset="100%" stop-color="#bfdbfe"/>
              </linearGradient>
              <!-- Island land color -->
              <linearGradient id="landGrad" x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stop-color="#d1fae5"/>
                <stop offset="100%" stop-color="#a7f3d0"/>
              </linearGradient>
              <filter id="markerShadow" x="-50%" y="-50%" width="200%" height="200%">
                <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-color="rgba(0,0,0,0.15)"/>
              </filter>
            </defs>

            <!-- Ocean -->
            <rect width="300" height="200" fill="url(#oceanGrad)" rx="6"/>

            <!-- Subtle wave texture -->
            <g stroke="rgba(147,197,253,0.4)" stroke-width="0.5" fill="none">
              <path d="M0,60 Q30,55 60,60 Q90,65 120,60 Q150,55 180,60 Q210,65 240,60 Q270,55 300,60"/>
              <path d="M0,140 Q30,135 60,140 Q90,145 120,140 Q150,135 180,140 Q210,145 240,140 Q270,135 300,140"/>
            </g>

            <!-- NC island silhouette -->
            <path d="M18,110 Q25,85 45,75 Q65,60 90,58 Q115,50 138,48 Q162,44 185,46 Q208,46 228,54 Q248,62 258,76 Q264,88 260,100 Q255,112 242,116 Q225,122 205,118 Q182,114 160,112 Q138,112 115,115 Q90,118 68,118 Q45,118 28,114 Z"
              fill="url(#landGrad)" stroke="#6ee7b7" stroke-width="0.8"/>

            <!-- Terrain shading -->
            <path d="M80,75 Q105,60 130,58 Q155,52 175,55 Q190,55 200,62 Q185,68 165,70 Q145,70 125,72 Q105,74 85,78 Z"
              fill="#6ee7b7" opacity="0.35"/>

            <!-- Compass rose -->
            <g transform="translate(278,16)" fill="#93c5fd">
              <text x="0" y="-5" text-anchor="middle" font-size="6" font-weight="700">N</text>
              <line x1="0" y1="-3" x2="0" y2="3" stroke="#93c5fd" stroke-width="1"/>
              <line x1="-3" y1="0" x2="3" y2="0" stroke="#bfdbfe" stroke-width="0.7"/>
            </g>

            <!-- Scale label -->
            <line x1="12" y1="185" x2="52" y2="185" stroke="#93c5fd" stroke-width="0.8"/>
            <text x="32" y="193" text-anchor="middle" font-size="5" fill="#93c5fd">200 km</text>

            <!-- ── Mine markers ── -->

            <!-- Nouméa -->
            <g transform="translate(60,108)" filter="url(#markerShadow)">
              <circle r="8" fill="rgba(26,58,92,0.1)" stroke="#1a3a5c" stroke-width="1.5"/>
              <circle r="3.5" fill="#1a3a5c"/>
            </g>
            <text x="60" y="122" text-anchor="middle" font-size="6.5" fill="#374151" font-weight="700">Nouméa</text>
            <text x="60" y="132" text-anchor="middle" font-size="9">☀️ 26°</text>

            <!-- Thio -->
            <g transform="translate(190,90)" filter="url(#markerShadow)">
              <circle r="8" fill="rgba(26,58,92,0.1)" stroke="#1a3a5c" stroke-width="1.5"/>
              <circle r="3.5" fill="#1a3a5c"/>
            </g>
            <text x="190" y="104" text-anchor="middle" font-size="6.5" fill="#374151" font-weight="700">Thio</text>
            <text x="190" y="114" text-anchor="middle" font-size="9">⛅ 25°</text>

            <!-- Koniambo — ACTIVE (hovered) -->
            <g transform="translate(150,60)" filter="url(#markerShadow)">
              <circle r="11" fill="rgba(59,130,246,0.15)" stroke="#3b82f6" stroke-width="2"/>
              <circle r="4.5" fill="#3b82f6"/>
            </g>
            <text x="150" y="76" text-anchor="middle" font-size="6.5" fill="#1d4ed8" font-weight="700">Koniambo</text>
            <text x="150" y="86" text-anchor="middle" font-size="9">☀️ 27°</text>

            <!-- Kouaoua -->
            <g transform="translate(222,72)" filter="url(#markerShadow)">
              <circle r="8" fill="rgba(26,58,92,0.1)" stroke="#1a3a5c" stroke-width="1.5"/>
              <circle r="3.5" fill="#1a3a5c"/>
            </g>
            <text x="222" y="86" text-anchor="middle" font-size="6.5" fill="#374151" font-weight="700">Kouaoua</text>
            <text x="222" y="96" text-anchor="middle" font-size="9">⛅ 24°</text>

            <!-- Goro -->
            <g transform="translate(232,112)" filter="url(#markerShadow)">
              <circle r="8" fill="rgba(26,58,92,0.1)" stroke="#1a3a5c" stroke-width="1.5"/>
              <circle r="3.5" fill="#1a3a5c"/>
            </g>
            <text x="232" y="126" text-anchor="middle" font-size="6.5" fill="#374151" font-weight="700">Goro</text>
            <text x="232" y="136" text-anchor="middle" font-size="9">🌧️ 22°</text>
          </svg>
        </div>

        <div class="weather-footer">
          <span class="footer-text"><span style="color:#10b981;font-weight:600;">●</span> Open-Meteo · 자동 갱신</span>
          <span class="footer-text">방금 업데이트됨</span>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
